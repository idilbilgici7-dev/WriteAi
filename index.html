<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WriteAi Premium | v2.0</title>
    <!-- PDF Kütüphanesi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #8b5cf6; --bg: #030712; --card: #111827; --text: #f3f4f6; --border: #1f2937; }
        body.light { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; margin: 0; }
        .nav { display: flex; justify-content: space-between; padding: 15px 40px; background: var(--card); border-bottom: 1px solid var(--border); }
        .premium-tag { background: linear-gradient(to right, #f59e0b, #ef4444); color: white; padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; vertical-align: middle; }
        
        .container { max-width: 1100px; margin: 30px auto; padding: 20px; }
        .config-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        
        select, textarea { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 12px; font-size: 0.9rem; }
        textarea { width: 100%; height: 280px; box-sizing: border-box; font-size: 1.1rem; }
        
        .main-btn { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 14px; font-weight: 800; cursor: pointer; margin-top: 15px; }
        .tool-bar { display: flex; gap: 10px; margin-top: 15px; }
        .tool-btn { flex: 1; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 10px; cursor: pointer; }

        .results { display: none; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-top: 30px; animation: fadeInUp 0.5s; }
        .panel { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 20px; }
        
        .bar-wrap { margin-bottom: 15px; }
        .bar-bg { background: #334155; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .bar-fill { background: var(--accent); height: 100%; width: 0; transition: 1s cubic-bezier(0.1,0.5,0.1,1); }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="dark" id="mainBody">

<nav class="nav">
    <div style="font-size: 1.4rem; font-weight: 800;">WriteAi <span class="premium-tag">PREMIUM</span></div>
    <div style="display: flex; gap: 15px; align-items: center;">
        <i class="fas fa-sun" onclick="setTheme('light')" style="cursor:pointer;"></i>
        <i class="fas fa-moon" onclick="setTheme('dark')" style="cursor:pointer;"></i>
        <select id="appLang" style="padding: 4px;"><option>Türkçe</option><option>English</option></select>
    </div>
</nav>

<div class="container">
    <div class="config-bar">
        <select id="ageGroup">
            <option value="7-12">7-12 Yaş</option><option value="13-18">13-18 Yaş</option>
            <option value="19-25" selected>19-25 Yaş</option><option value="26-40">26-40 Yaş</option>
            <option value="41-60">41-60 Yaş</option><option value="60+">60+ Yaş</option>
        </select>
        <select id="level">
            <option>A1</option><option>A2</option><option>B1</option><option selected>B2</option>
            <option>C1</option><option>C2</option><option>Native</option>
        </select>
        <select id="inLang">
            <option value="tr">Giriş: TR</option><option value="en">Giriş: EN</option>
            <option value="de">Giriş: DE</option><option value="fr">Giriş: FR</option>
        </select>
        <select id="outLang">
            <option value="tr">Çıkış: TR</option><option value="en">Çıkış: EN</option>
            <option value="de">Çıkış: DE</option><option value="fr">Çıkış: FR</option>
        </select>
    </div>

    <textarea id="userInput" placeholder="Premium metin mühendisliği için yazmaya başlayın..."></textarea>
    
    <button class="main-btn" onclick="runEngine()" id="btnRun">
        <i class="fas fa-bolt"></i> ANALİZ ET VE GELİŞTİR
    </button>

    <div class="tool-bar">
        <button class="tool-btn" onclick="copyResult()"><i class="fas fa-copy"></i> Kopyala</button>
        <button class="tool-btn" onclick="downloadPDF()"><i class="fas fa-file-pdf"></i> PDF İndir</button>
        <button class="tool-btn" onclick="shareDoc()"><i class="fas fa-share-nodes"></i> Paylaş</button>
    </div>

    <div class="results" id="res">
        <div class="panel">
            <h3><i class="fas fa-check-circle"></i> Sonuç Metni</h3>
            <div id="outText" style="white-space: pre-wrap; line-height: 1.6;"></div>
            <p id="feedbackText" style="color: var(--accent); font-style: italic; margin-top: 15px;"></p>
        </div>
        <div class="panel">
            <h3><i class="fas fa-chart-bar"></i> Metin Metrikleri</h3>
            <div id="stats"></div>
            <hr style="border-color: var(--border); margin: 20px 0;">
            <h3><i class="fas fa-shield-halved"></i> AI Koruma</h3>
            <div style="font-size: 0.8rem; color: #10b981;">Premium İnsanlaştırma Aktif: %98 İnsan</div>
        </div>
    </div>
</div>

<script>
    function setTheme(t) { document.getElementById('mainBody').className = t; }

    async function runEngine() {
        const btn = document.getElementById('btnRun');
        const text = document.getElementById('userInput').value;
        if(!text) return alert("Metin boş!");

        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> İşleniyor...';
        
        try {
            const res = await fetch('https://writeai.onrender.com/api/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    text: text,
                    input_lang: document.getElementById('inLang').value,
                    output_lang: document.getElementById('outLang').value,
                    age_group: document.getElementById('ageGroup').value,
                    level: document.getElementById('level').value
                })
            });
            const d = (await res.json()).data;

            document.getElementById('outText').innerText = d.corrected;
            document.getElementById('feedbackText').innerText = "💡 " + d.feedback;
            
            let statsHtml = '';
            for(const [k, v] of Object.entries(d.scores)) {
                statsHtml += `
                    <div class="bar-wrap">
                        <div style="display:flex; justify-content:space-between; font-size:0.8rem;"><span>${k}</span><span>%${v}</span></div>
                        <div class="bar-bg"><div class="bar-fill" style="width:${v}%"></div></div>
                    </div>`;
            }
            document.getElementById('stats').innerHTML = statsHtml;
            document.getElementById('res').style.display = 'grid';
            document.getElementById('res').scrollIntoView({behavior: 'smooth'});
        } catch(e) {
            alert("Sunucu uyarısı: Bağlantı kurulamadı.");
        } finally {
            btn.innerHTML = '<i class="fas fa-bolt"></i> ANALİZ ET VE GELİŞTİR';
        }
    }

    function copyResult() {
        navigator.clipboard.writeText(document.getElementById('outText').innerText);
        alert("Metin panoya kopyalandı!");
    }

    function downloadPDF() {
        const element = document.getElementById('outText');
        html2pdf().from(element).set({margin: 1, filename: 'WriteAi_Premium_Report.pdf'}).save();
    }

    function shareDoc() {
        alert("Paylaşım linki oluşturuldu ve kopyalandı! (Premium)");
    }
</script>
</body>
</html>
