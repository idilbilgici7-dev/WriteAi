<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WriteAI Pro | Global AI Writing Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #8b5cf6;
        }
        .light-mode {
            --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --accent: #6366f1;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text);
            transition: all 0.3s ease; padding: 20px;
        }

        .navbar { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto 30px; }
        
        .container { max-width: 1000px; margin: 0 auto; }
        
        .editor-box {
            background-color: var(--card); padding: 30px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
        }

        .grid-filters {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px;
        }

        select, textarea {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #475569;
            background: var(--bg); color: var(--text); font-size: 14px; outline: none;
        }

        textarea { height: 180px; font-size: 16px; margin-top: 10px; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        
        .primary-btn {
            flex: 2; background: linear-gradient(135deg, #8b5cf6, #6366f1); color: white;
            border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        .icon-btn {
            background: var(--card); border: 1px solid #475569; color: var(--text);
            padding: 10px 15px; border-radius: 10px; cursor: pointer;
        }

        /* Result Section */
        #results { margin-top: 30px; display: none; animation: fadeIn 0.5s; }
        .result-card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid var(--accent); }

        /* Auth & Pay Overlay */
        .overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal { background: var(--card); padding: 40px; border-radius: 20px; text-align: center; max-width: 400px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="navbar">
        <h2><i class="fas fa-brain"></i> WriteAI <span style="font-size: 12px; opacity: 0.6;">v2.0 PRO</span></h2>
        <div>
            <button class="icon-btn" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
            <button class="icon-btn" onclick="showModal('auth')">Giriş Yap</button>
            <button class="primary-btn" onclick="showModal('pay')" style="padding: 10px 20px;">Premium Al 👑</button>
        </div>
    </div>

    <div class="container">
        <div class="editor-box">
            <div class="grid-filters">
                <div>
                    <label>Yaş Grubu</label>
                    <select id="userAge">
                        <option value="0-6">0-6 Yaş</option><option value="7-12">7-12 Yaş</option>
                        <option value="13-18">13-18 Yaş</option><option value="19-24">19-24 Yaş</option>
                        <option value="25-30">25-30 Yaş</option><option value="31-36">31-36 Yaş</option>
                        <option value="37-42">37-42 Yaş</option><option value="43-48">43-48 Yaş</option>
                        <option value="49-54">49-54 Yaş</option><option value="55-60">55-60 Yaş</option>
                        <option value="61+">61+ Yaş</option>
                    </select>
                </div>
                <div>
                    <label>Giriş Dili</label>
                    <select id="inputLang">
                        <option value="tr">Türkçe</option><option value="en">İngilizce</option>
                        <option value="de">Almanca</option><option value="fr">Fransızca</option>
                        <option value="es">İspanyolca</option><option value="ru">Rusça</option>
                    </select>
                </div>
                <div>
                    <label>Hedef Dil (Çıkış)</label>
                    <select id="outputLang">
                        <option value="tr">Türkçe</option><option value="en">İngilizce</option>
                        <option value="de">Almanca</option><option value="fr">Fransızca</option>
                        <option value="es">İspanyolca</option><option value="it">İtalyanca</option>
                        <option value="ar">Arapça</option><option value="zh">Çince</option>
                    </select>
                </div>
                <div>
                    <label>Dil Seviyesi</label>
                    <select id="userLevel">
                        <option value="A1">A1 - Başlangıç</option><option value="A2">A2 - Temel</option>
                        <option value="B1">B1 - Orta</option><option value="B2">B2 - Üst Orta</option>
                        <option value="C1">C1 - İleri</option><option value="C2">C2 - Uzman/Native</option>
                    </select>
                </div>
                <div>
                    <label>Kullanım Amacı</label>
                    <select id="userPurpose">
                        <option value="business">İş / Profesyonel</option>
                        <option value="academic">Akademik / Makale</option>
                        <option value="creative">Yaratıcı Yazarlık / Hikaye</option>
                        <option value="social">Sosyal Medya / Viral</option>
                        <option value="email">Resmi E-posta</option>
                        <option value="funny">Mizah / Eğlence</option>
                    </select>
                </div>
            </div>

            <textarea id="textInput" placeholder="Buraya yazın veya yapıştırın..."></textarea>
            
            <div class="btn-group">
                <button class="primary-btn" onclick="analyzeData()" id="mainBtn">Analiz Et & Mükemmelleştir ✨</button>
                <button class="icon-btn" onclick="copyText()" title="Kopyala"><i class="fas fa-copy"></i></button>
                <button class="icon-btn" onclick="downloadPDF()" title="PDF İndir"><i class="fas fa-file-pdf"></i></button>
            </div>
        </div>

        <div id="results">
            <div class="result-card">
                <h3><i class="fas fa-magic"></i> Optimize Edilmiş Metin</h3>
                <p id="resCorrected" style="font-size: 18px; line-height: 1.6;"></p>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="result-card">
                    <h4><i class="fas fa-robot"></i> AI Skoru</h4>
                    <p id="resAi"></p>
                </div>
                <div class="result-card">
                    <h4><i class="fas fa-lightbulb"></i> Uzman Notu</h4>
                    <p id="resFeedback"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        // TEMA DEĞİŞTİRME
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.querySelector('.navbar .fa-moon');
            icon.classList.toggle('fa-sun');
        }

        // MODAL YÖNETİMİ
        function showModal(type) {
            const overlay = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            overlay.style.display = 'flex';
            
            if(type === 'auth') {
                content.innerHTML = `
                    <h2>Hoş Geldiniz</h2>
                    <p>Hemen kayıt olun veya giriş yapın.</p>
                    <button class="primary-btn" style="width:100%; margin-bottom:10px;"><i class="fab fa-google"></i> Google ile Giriş</button>
                    <button class="icon-btn" style="width:100%;">E-posta ile Giriş</button>
                `;
            } else {
                content.innerHTML = `
                    <h2>Premium'a Yükselt 👑</h2>
                    <p>Sınırsız OpenAI analizi ve PDF raporları için.</p>
                    <h3 style="color:#8b5cf6">$9.99 / Ay</h3>
                    <button class="primary-btn" style="width:100%;" onclick="alert('Ödeme sistemine yönlendiriliyor...')">Kredi Kartı ile Öde</button>
                `;
            }
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

        // KOPYALAMA
        function copyText() {
            const text = document.getElementById('resCorrected').innerText;
            navigator.clipboard.writeText(text);
            alert("Metin kopyalandı!");
        }

        // PDF İNDİRME
        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("WriteAI Analiz Raporu", 10, 10);
            doc.text(document.getElementById('resCorrected').innerText, 10, 20);
            doc.save("analiz-raporu.pdf");
        }

        // ANALİZ (API BAĞLANTISI)
        async function analyzeData() {
            const btn = document.getElementById("mainBtn");
            const text = document.getElementById("textInput").value;
            if(!text) return alert("Metin girin!");

            btn.innerText = "Yapay Zeka Çalışıyor... 🧠";
            
            try {
                const res = await fetch("https://writeai.onrender.com/api/analyze", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        text: text,
                        age_group: document.getElementById("userAge").value,
                        learning_level: document.getElementById("userLevel").value,
                        use_case: document.getElementById("userPurpose").value,
                        // Not: Arka planı güncellediğimizde bu dilleri de göndereceğiz
                    })
                });
                const result = await res.json();
                document.getElementById("resCorrected").innerText = result.data.grammar_and_suggestions.corrected_text;
                document.getElementById("resAi").innerText = "%" + result.data.ai_detection.ai_probability;
                document.getElementById("resFeedback").innerText = result.data.grammar_and_suggestions.contextual_feedback[0];
                document.getElementById("results").style.display = "block";
            } catch (e) {
                alert("Hata! Render uyanıyor olabilir, lütfen 30 sn sonra tekrar dene.");
            }
            btn.innerText = "Analiz Et & Mükemmelleştir ✨";
        }
    </script>
</body>
</html>
