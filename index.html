<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WriteAi | 8 Dilli Duygu & İçerik Mühendisliği</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg: #030712; --card: #111827; --border: #1f2937;
            --accent: #8b5cf6; --accent-hover: #7c3aed;
            --text-p: #f9fafb; --text-s: #9ca3af; --success: #10b981;
        }
        .light-mode {
            --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0;
            --text-p: #0f172a; --text-s: #475569;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-p); }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 6%; background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 800; font-size: 1.8rem; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 3.5rem; font-weight: 800; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .app-card { background: var(--card); border: 1px solid var(--border); border-radius: 32px; padding: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        .field label { font-size: 0.75rem; font-weight: 700; color: var(--text-s); text-transform: uppercase; letter-spacing: 1px; }

        select, textarea {
            background: rgba(0,0,0,0.2); border: 1px solid var(--border);
            color: var(--text-p); padding: 12px; border-radius: 14px; font-size: 1rem; outline: none;
        }
        textarea { height: 220px; resize: none; width: 100%; margin-top: 10px; }

        .btn-main {
            background: var(--accent); color: white; border: none; padding: 18px; border-radius: 16px;
            font-weight: 800; font-size: 1.1rem; cursor: pointer; width: 100%; margin-top: 20px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-main:hover { background: var(--accent-hover); transform: translateY(-2px); }

        .results-wrapper { display: none; margin-top: 40px; grid-template-columns: 1.5fr 1fr; gap: 30px; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .panel { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 24px; }
        .s-bar { margin-bottom: 20px; }
        .s-track { background: var(--border); height: 10px; border-radius: 5px; overflow: hidden; margin-top: 8px; }
        .s-fill { background: var(--accent); height: 100%; width: 0; transition: 1.5s ease-out; }

        .lang-badge { padding: 4px 10px; background: var(--border); border-radius: 8px; font-size: 0.8rem; font-weight: 600; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Write<span>Ai</span></div>
        <div style="display: flex; gap: 15px;">
            <select id="uiLang" onchange="translatePage()" style="width: auto; padding: 5px 15px;">
                <option value="tr">🇹🇷 Türkçe</option>
                <option value="en">🇺🇸 English</option>
                <option value="de">🇩🇪 Deutsch</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="es">🇪🇸 Español</option>
                <option value="it">🇮🇹 Italiano</option>
                <option value="ru">🇷🇺 Русский</option>
                <option value="pt">🇵🇹 Português</option>
            </select>
            <button onclick="document.body.classList.toggle('light-mode')" class="btn-main" style="width:45px; height:45px; margin:0; border-radius:12px;"><i class="fas fa-moon"></i></button>
        </div>
    </nav>

    <div class="container">
        <header class="hero">
            <h1 id="ui-hero-h">WriteAi Master</h1>
            <p id="ui-hero-p">8 dilde profesyonel içerik üretimi ve derin duygu analizi.</p>
        </header>

        <div class="app-card">
            <div class="config-grid">
                <div class="field">
                    <label id="lbl-age">Hedef Yaş</label>
                    <select id="inAge">
                        <script>for(let i=0; i<=84; i+=6) document.write(`<option value="${i}-${i+6}">${i}-${i+6} Yaş</option>`);</script>
                    </select>
                </div>

                <div class="field">
                    <label id="lbl-type">İçerik Türü</label>
                    <select id="inType">
                        <option value="poem">🌹 Şiir (Poem)</option>
                        <option value="story">📚 Hikaye (Story)</option>
                        <option value="formal">💼 Resmi Yazışma</option>
                        <option value="social">📱 Sosyal Medya</option>
                        <option value="academic">🎓 Akademik Makale</option>
                        <option value="lyric">🎵 Şarkı Sözü</option>
                    </select>
                </div>

                <div class="field">
                    <label id="lbl-in">Giriş Dili</label>
                    <select id="inLang">
                        <option value="tr">Türkçe</option><option value="en">English</option>
                        <option value="de">Deutsch</option><option value="fr">Français</option>
                        <option value="es">Español</option><option value="it">Italiano</option>
                        <option value="ru">Русский</option><option value="pt">Português</option>
                    </select>
                </div>

                <div class="field">
                    <label id="lbl-out">Çıkış Dili</label>
                    <select id="outLang">
                        <option value="en">English</option><option value="tr">Türkçe</option>
                        <option value="de">Deutsch</option><option value="fr">Français</option>
                        <option value="es">Español</option><option value="it">Italiano</option>
                        <option value="ru">Русский</option><option value="pt">Português</option>
                    </select>
                </div>

                <div class="field">
                    <label id="lbl-level">Seviye</label>
                    <select id="inLevel">
                        <option value="A1">A1 - Beginner</option>
                        <option value="B2">B2 - Intermediate</option>
                        <option value="C2">C2 - Native / Expert</option>
                    </select>
                </div>
            </div>

            <textarea id="mainInput" placeholder="Analiz edilecek veya dönüştürülecek metni buraya yazın..."></textarea>
            
            <button class="btn-main" onclick="processWriteAi()" id="btn-txt">
                <i class="fas fa-sparkles"></i> <span>Analiz Et ve Dönüştür</span>
            </button>
        </div>

        <div id="results" class="results-wrapper">
            <div class="panel">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3 id="ui-res-title">WriteAi Sonucu</h3>
                    <div>
                        <button onclick="copyToClipboard()" class="lang-badge" style="cursor:pointer; border:none;">Kopyala</button>
                        <button onclick="exportToPDF()" class="lang-badge" style="cursor:pointer; border:none; background:var(--accent);">PDF</button>
                    </div>
                </div>
                <p id="resContent" style="font-size: 1.3rem; margin-top: 20px; line-height: 1.8;"></p>
            </div>

            <div class="panel">
                <h3 id="ui-sent-title">Duygu Grafiği</h3>
                <div id="sentimentBars" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script>
        // 8 DİLLİ TAM SÖZLÜK
        const dictionary = {
            tr: { heroH: "WriteAi Master", heroP: "8 dilde profesyonel içerik üretimi.", btn: "Analiz Et ve Dönüştür", age: "Hedef Yaş", type: "İçerik Türü", in: "Giriş Dili", out: "Çıkış Dili", level: "Seviye", res: "WriteAi Sonucu", sent: "Duygu Grafiği", ph: "Metni buraya yazın..." },
            en: { heroH: "WriteAi Master", heroP: "Professional content creation in 8 languages.", btn: "Analyze & Transform", age: "Target Age", type: "Content Type", in: "Input Language", out: "Output Language", level: "Level", res: "WriteAi Result", sent: "Sentiment Chart", ph: "Write your text here..." },
            de: { heroH: "WriteAi Master", heroP: "Professionelle Inhaltsdarstellung in 8 Sprachen.", btn: "Analysieren", age: "Alter", type: "Inhaltstyp", in: "Eingabesprache", out: "Zielsprache", level: "Stufe", res: "WriteAi Ergebnis", sent: "Gefühlsdiagramm", ph: "Text hier schreiben..." },
            fr: { heroH: "WriteAi Master", heroP: "Création de contenu en 8 langues.", btn: "Analyser & Transformer", age: "Âge", type: "Type", in: "Langue d'entrée", out: "Langue de sortie", level: "Niveau", res: "Résultat", sent: "Graphique d'émotion", ph: "Écrivez ici..." },
            es: { heroH: "WriteAi Master", heroP: "Creación de contenido en 8 idiomas.", btn: "Analizar y Transformar", age: "Edad", type: "Tipo", in: "Idioma de entrada", out: "Idioma de salida", level: "Nivel", res: "Resultado", sent: "Gráfico de sentimientos", ph: "Escribe aquí..." },
            it: { heroH: "WriteAi Master", heroP: "Creazione di contenuti in 8 lingue.", btn: "Analizza e Trasforma", age: "Età", type: "Tipo", in: "Lingua d'ingresso", out: "Lingua d'uscita", level: "Livello", res: "Risultato", sent: "Grafico sentimenti", ph: "Scrivi qui..." },
            ru: { heroH: "WriteAi Master", heroP: "Контент на 8 языках.", btn: "Анализировать", age: "Возраст", type: "Тип", in: "Язык ввода", out: "Язык вывода", level: "Уровень", res: "Результат", sent: "График эмоций", ph: "Пишите здесь..." },
            pt: { heroH: "WriteAi Master", heroP: "Conteúdo em 8 idiomas.", btn: "Analisar", age: "Idade", type: "Tipo", in: "Entrada", out: "Saída", level: "Nível", res: "Resultado", sent: "Sentimento", ph: "Escreva aqui..." }
        };

        function translatePage() {
            const l = document.getElementById('uiLang').value;
            const t = dictionary[l];
            document.getElementById('ui-hero-h').innerText = t.heroH;
            document.getElementById('ui-hero-p').innerText = t.heroP;
            document.getElementById('btn-txt').querySelector('span').innerText = t.btn;
            document.getElementById('lbl-age').innerText = t.age;
            document.getElementById('lbl-type').innerText = t.type;
            document.getElementById('lbl-in').innerText = t.in;
            document.getElementById('lbl-out').innerText = t.out;
            document.getElementById('lbl-level').innerText = t.level;
            document.getElementById('ui-res-title').innerText = t.res;
            document.getElementById('ui-sent-title').innerText = t.sent;
            document.getElementById('mainInput').placeholder = t.ph;
        }

        async function processWriteAi() {
            const btn = document.getElementById('btn-txt');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            
            try {
                const response = await fetch("https://writeai.onrender.com/api/analyze", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        text: document.getElementById('mainInput').value,
                        age_group: document.getElementById('inAge').value,
                        learning_level: document.getElementById('inLevel').value,
                        use_case: "general",
                        input_lang: document.getElementById('inLang').value,
                        output_lang: document.getElementById('outLang').value,
                        content_type: document.getElementById('inType').value
                    })
                });
                const result = await response.json();
                const d = result.data;

                document.getElementById('resContent').innerText = d.grammar_and_suggestions.corrected_text;
                
                const bars = document.getElementById('sentimentBars');
                bars.innerHTML = '';
                for(const [name, val] of Object.entries(d.sentiment_analysis.scores)) {
                    bars.innerHTML += `
                        <div class="s-bar">
                            <div style="display:flex; justify-content:space-between; font-size:0.9rem;">
                                <span>${name}</span><span>%${val}</span>
                            </div>
                            <div class="s-track"><div class="s-fill" style="width:${val}%"></div></div>
                        </div>`;
                }
                document.getElementById('results').style.display = 'grid';
            } catch(e) { alert("Sunucu hatası! Lütfen tekrar deneyin."); }
            
            btn.innerHTML = '<i class="fas fa-sparkles"></i> <span>' + dictionary[document.getElementById('uiLang').value].btn + '</span>';
        }

        function copyToClipboard() { navigator.clipboard.writeText(document.getElementById('resContent').innerText); alert("Kopyalandı!"); }
        function exportToPDF() { const doc = new jspdf.jsPDF(); doc.text(document.getElementById('resContent').innerText, 10, 10, {maxWidth: 180}); doc.save("WriteAi.pdf"); }
    </script>
</body>
</html>
